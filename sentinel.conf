# Redis Sentinel Configuration
# ==============================
# This file is used by all three sentinel containers.
# Docker Compose bind-mounts it as read-only into each sentinel container.
#
# Sentinel job:
#   1. Monitor the primary (redis-primary:6379)
#   2. If the primary is unreachable for `down-after-milliseconds`, mark it as down
#   3. Once `quorum` sentinels agree it's down, start a failover vote
#   4. Elect a new primary from the replicas
#   5. Tell all connected clients (ioredis) the new primary's address
#
# quorum = 2 means at least 2 of the 3 sentinels must agree before
# a failover is triggered. This prevents a single sentinel with a bad
# network view from causing a false failover.

sentinel monitor mymaster redis-primary 6379 2

# How long (ms) a primary must be unreachable before sentinels consider it down
sentinel down-after-milliseconds mymaster 5000

# How many replicas can be reconfigured in parallel during failover
# 1 = reconfigure one replica at a time (safest)
sentinel parallel-syncs mymaster 1

# How long (ms) a failover can take before it's considered failed and retried
sentinel failover-timeout mymaster 10000
